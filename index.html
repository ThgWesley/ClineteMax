<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Barber Pro Elite - Topind!ca</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/croppie/2.6.5/croppie.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/croppie/2.6.5/croppie.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="bg-white p-6 shadow-sm sticky top-0 z-50">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 id="page-title" class="text-2xl font-black italic tracking-tighter text-slate-900 uppercase">Lista Semanal</h1>
                <p id="data-topo" class="text-[10px] font-bold text-rose-500 uppercase tracking-widest"></p>
            </div>
            <button onclick="abrirModal(true)" class="bg-slate-900 text-white w-12 h-12 rounded-2xl shadow-lg flex items-center justify-center active:scale-95 transition-transform">
                <i class="fas fa-plus"></i>
            </button>
        </div>
        
        <div class="flex gap-2 overflow-x-auto no-scrollbar pb-2">
            <button id="nav-semanal" onclick="mudarAba('semanal', this)" class="flex-1 min-w-[85px] bg-rose-50 border-2 border-rose-500 p-3 rounded-2xl flex flex-col items-center transition-all">
                <i class="fas fa-calendar-alt text-rose-600 mb-1"></i>
                <span class="text-[9px] font-black uppercase text-rose-600">Agenda</span>
            </button>
            <button id="nav-clientes" onclick="mudarAba('clientes', this)" class="flex-1 min-w-[85px] bg-slate-50 border-2 border-transparent p-3 rounded-2xl flex flex-col items-center transition-all text-slate-400">
                <i class="fas fa-users mb-1"></i>
                <span class="text-[9px] font-black uppercase">Clientes</span>
            </button>
            <button id="nav-produtos" onclick="mudarAba('produtos', this)" class="flex-1 min-w-[85px] bg-slate-50 border-2 border-transparent p-3 rounded-2xl flex flex-col items-center transition-all text-slate-400">
                <i class="fas fa-box-open mb-1"></i>
                <span class="text-[9px] font-black uppercase">Produtos</span>
            </button>
            <button id="nav-ajustes" onclick="mudarAba('ajustes', this)" class="flex-1 min-w-[85px] bg-slate-50 border-2 border-transparent p-3 rounded-2xl flex flex-col items-center transition-all text-slate-400">
                <i class="fas fa-cog mb-1"></i>
                <span class="text-[9px] font-black uppercase">Ajustes</span>
            </button>
        </div>

        <div id="faturamento-container" class="mt-4 bg-slate-900 p-4 rounded-2xl text-center">
            <span class="text-slate-400 text-[10px] font-bold uppercase">Faturamento da Semana</span>
            <p id="total-semanal" class="text-xl font-black text-rose-500">R$ 0,00</p>
        </div>
    </header>

    <main class="p-4">
        <section id="tab-semanal" class="space-y-2"></section>
        
        <section id="tab-clientes" class="hidden">
            <input type="text" id="filtro-cliente" onkeyup="renderClientes()" placeholder="Procurar cliente ou tag..." class="mb-2 w-full p-4 rounded-xl border">
            <div id="container-tags" class="flex gap-2 overflow-x-auto pb-4 mb-2 no-scrollbar"></div>
            <div id="lista-clientes" class="grid gap-3"></div>
        </section>
        
        <section id="tab-produtos" class="hidden">
            <input type="text" id="filtro-produto" onkeyup="renderProdutos()" placeholder="Procurar produto..." class="mb-4 w-full p-4 rounded-xl border">
            <div id="lista-produtos" class="grid gap-3"></div>
        </section>

        <section id="tab-ajustes" class="hidden space-y-4">
            <div class="bg-slate-900 p-6 rounded-3xl text-white shadow-xl">
                <div class="flex justify-between items-center mb-4 border-b border-slate-700 pb-4">
                    <h3 class="text-[10px] font-black uppercase text-rose-500 tracking-widest">Dashboard de Lucro</h3>
                    <div class="flex items-center gap-2 bg-slate-800 px-3 py-2 rounded-xl">
                        <label for="input-porcentagem" class="text-[9px] font-bold text-slate-400 uppercase">Minha %</label>
                        <input type="number" id="input-porcentagem" onkeyup="salvarPorcentagem(this.value)" onchange="salvarPorcentagem(this.value)" class="w-12 bg-transparent text-emerald-400 font-black text-center outline-none p-0 border-none text-sm" min="0" max="100">
                    </div>
                </div>
                
                <div class="grid grid-cols-2 gap-4 text-center">
                    <div>
                        <p id="label-meu" class="text-[9px] text-slate-400 font-bold uppercase mb-1 italic">Minha Parte</p>
                        <p id="dash-meu" class="text-xl font-black text-emerald-400 font-mono">R$ 0,00</p>
                    </div>
                    <div>
                        <p id="label-custos" class="text-[9px] text-slate-400 font-bold uppercase mb-1 italic">Loja/Custos</p>
                        <p id="dash-custos" class="text-xl font-black text-slate-300 font-mono">R$ 0,00</p>
                    </div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                <h3 class="text-[10px] font-black uppercase text-slate-400 mb-4 tracking-widest text-center italic">Relatórios Visuais</h3>
                <button onclick="gerarRelatorioPNG()" class="w-full mb-3 bg-emerald-50 text-emerald-700 p-4 rounded-2xl flex items-center justify-between font-black uppercase text-[10px] active:scale-95 transition-transform">
                    Gerar Relatório (PNG) <i class="fas fa-file-image text-emerald-500"></i>
                </button>
            </div>
            
            <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                <h3 class="text-[10px] font-black uppercase text-slate-400 mb-4 tracking-widest text-center italic">Segurança de Dados</h3>
                <button onclick="exportarBackup()" class="w-full mb-3 bg-slate-50 text-slate-700 p-4 rounded-2xl flex items-center justify-between font-black uppercase text-[10px] active:scale-95 transition-transform">
                    Exportar JSON <i class="fas fa-download text-rose-500"></i>
                </button>
                <button onclick="document.getElementById('importFile').click()" class="w-full border-2 border-dashed border-slate-100 text-slate-400 p-4 rounded-2xl flex items-center justify-between font-black uppercase text-[10px] active:scale-95 transition-transform">
                    Importar JSON <i class="fas fa-upload"></i>
                </button>
                <input type="file" id="importFile" onchange="importarBackup(event)" class="hidden" accept=".json">
            </div>
        </section>
    </main>

    <div id="relatorio-temp" style="position: absolute; left: -9999px; width: 400px; background: white; padding: 20px; border-radius: 20px;"></div>

    <div id="modal">
        <div class="modal-content">
            <div class="flex justify-between items-center mb-6">
                <h2 id="modal-title" class="text-lg font-black uppercase">Novo Registro</h2>
                <button onclick="fecharModal()"><i class="fas fa-times-circle text-2xl text-slate-200"></i></button>
            </div>
            <div id="campos-dinamicos"></div>
            <button id="btn-confirmar" onclick="salvarDados()" class="w-full bg-rose-600 text-white py-4 rounded-2xl font-black uppercase mt-6">Confirmar</button>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/utils.js"></script>
</body>
</html>
